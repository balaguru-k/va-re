# =====================================================================
# Global Monorepo Configuration
# =====================================================================
sonar.projectKey=SonarQube
sonar.projectName=Enterprise React and Node Application
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Source Code Paths - Corrected to map to your actual client/server directories 
sonar.sources=client/src,server

# Structural and Compiled File Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.spec.js,**/*.test.js,**/server/database/migrations/**,**/server/database/seeds/**,**/knexfile.js

# =====================================================================
# Frontend JavaScript/TypeScript Properties
# =====================================================================
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
sonar.typescript.tsconfigPath=client/tsconfig.json
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info

# =====================================================================
# Backend API Layer Properties
# =====================================================================
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info
