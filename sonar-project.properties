# =====================================================================
# Global Monorepo Configuration
# =====================================================================
sonar.projectKey=SonarQube
sonar.projectName=Enterprise React and Node Application
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Source Code Paths (Relative to workspace root)
sonar.sources=frontend/src,backend/src

# Structural and Compiled File Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.spec.js,**/*.test.js,**/knexfile.js

# =====================================================================
# Frontend JavaScript/TypeScript Properties
# =====================================================================
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
sonar.typescript.tsconfigPath=frontend/tsconfig.json
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# =====================================================================
# Backend API Layer Properties
# =====================================================================
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
